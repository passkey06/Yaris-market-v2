<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yarış Market</title>

<link rel="stylesheet" href="css/style.css">

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

  <header class="header">

<button class="menuBtn">
<i class="fa-solid fa-bars"></i>
</button>

<div class="logoArea">

<img src="images/Logo.png" alt="Logo">

</div>

<button class="profileBtn">
<i class="fa-regular fa-circle-user"></i>
</button>

  </header>

  <section class="banner">

<div class="bannerLeft">

<h1>İhtiyacınız Olan<br>Her Şey</h1>

<p>1 Telefon Uzağınızda!</p>

<button class="shopBtn">

<i class="fa-solid fa-cart-shopping"></i>

ALIŞVERİŞE BAŞLA

</button>

</div>

<div class="bannerRight">

<img src="images/banner.png" alt="Banner">

</div>

  </section>
  
<section class="infoBar">

<div class="infoItem">

<i class="fa-solid fa-motorcycle"></i>

<div>

<span>Teslimat Ücreti</span>

<b>50 ₺</b>

</div>

</div>

<div class="infoItem">

<i class="fa-regular fa-clock"></i>

<div>

<span>Çalışma Saatleri</span>

<b>08:00 - 22:00</b>

</div>

</div>

<div class="infoItem">

<i class="fa-solid fa-location-dot"></i>

<div>

<span>Adresimiz</span>

<b>Cumhuriyet Meydanı</b>

</div>

</div>

</section>
  <section class="categories">

<h2>KATEGORİLER</h2>

<div class="categoryGrid">

<div class="categoryCard">
<img src="images/temel-gida.png" alt="Temel Gıda">
<p>Temel Gıda</p>
</div>

<div class="categoryCard">
<img src="images/icecek.png" alt="İçecekler">
<p>İçecekler</p>
</div>

<div class="categoryCard">
<img src="images/manav.png" alt="Manav">
<p>Manav</p>
</div>

<div class="categoryCard">
<img src="images/et-tavuk.png" alt="Et & Tavuk">
<p>Et & Tavuk</p>
</div>

<div class="categoryCard">
<img src="images/kuruyemis.png" alt="Kuruyemiş">
<p>Kuruyemiş</p>
</div>

<div class="categoryCard">
<img src="images/temizlik.png" alt="Temizlik">
<p>Temizlik</p>
</div>

</div>

  </section>
