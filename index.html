<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yarış Market</title>

<link rel="manifest" href="manifest.json">

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="header">

<button class="menuBtn">☰</button>

<div class="logoArea">

<img src="images/Logo.png" alt="Logo">

<div>

<h2>Yarış Market</h2>

<p>İhtiyacınız Olan Her Şey</p>

</div>

</div>

<button class="profileBtn">👤</button>

</header>

<section class="searchArea">

<input
type="text"
id="searchInput"
placeholder="Ürün Ara...">

</section>

<section class="hero">

<div class="heroText">

<h1>Alışveriş Artık Çok Daha Kolay</h1>

<p>
Ayaş'ın ilk online marketi
</p>

<button>
Alışverişe Başla
</button>

</div>

<div class="heroImage">

<img src="images/banner.png">

</div>

</section>

  <section class="infoCards">

<div class="card">
<h3>🚚 Teslimat</h3>
<p>30 Dakikada Teslim</p>
</div>

<div class="card">
<h3>🕗 Çalışma Saatleri</h3>
<p>08:00 - 22:00</p>
</div>

<div class="card">
<h3>📍 Bölge</h3>
<p>Ayaş Merkez</p>
</div>

</section>

<section class="categories">

<h2>Kategoriler</h2>

<div id="categoryList" class="categoryGrid"></div>

</section>

<section class="campaigns">

<h2>Kampanyalar</h2>

<div id="campaignList"></div>

</section>

<section class="products">

<h2>Tüm Ürünler</h2>

<div id="productList"></div>

</section>

<div class="cartBar">

<div>

<b>Sepet</b>

<p id="cartCount">0 Ürün</p>

</div>

<button id="whatsappBtn">

WhatsApp Sipariş

</button>

    </div>

  <footer class="bottomNav">

<button class="active">
🏠
<span>Anasayfa</span>
</button>

<button>
📂
<span>Kategoriler</span>
</button>

<button>
🛒
<span>Sepet</span>
</button>

<button>
📦
<span>Siparişler</span>
</button>

<button>
👤
<span>Profil</span>
</button>

</footer>

<script type="module" src="js/app.js"></script>

</body>
</html>
